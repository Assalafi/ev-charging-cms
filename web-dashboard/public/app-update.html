<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Update Control - EV Charging Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
    <style>
        body { background: #f0f2f5; }
        .auth-card { max-width: 420px; margin: 60px auto; }
        .main-card { max-width: 800px; margin: 40px auto; }
        .version-badge { font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background:#1B2150;">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-charging-station me-2"></i>
                EV Charge — App Update Control
            </a>
        </div>
    </nav>

    <!-- Login -->
    <div id="login-section">
        <div class="auth-card">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="text-center mb-4"><i class="fas fa-lock me-2"></i>Admin Login</h5>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="login-username" placeholder="admin">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="login-password">
                    </div>
                    <div id="login-error" class="alert alert-danger d-none"></div>
                    <button id="login-btn" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-1"></i> Login
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-section" class="d-none">
        <div class="main-card">
            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center" style="background:#1B2150;color:white;">
                    <h5 class="mb-0"><i class="fas fa-mobile-alt me-2"></i>Mobile App Update Settings</h5>
                    <button id="save-btn" class="btn btn-sm btn-light">
                        <i class="fas fa-save me-1"></i> Save Changes
                    </button>
                </div>
                <div class="card-body">
                    <div id="loading" class="text-center py-4">
                        <div class="spinner-border text-primary"></div>
                        <p class="mt-2 text-muted">Loading current settings...</p>
                    </div>
                    <div id="form" class="d-none">
                        <!-- Version Numbers -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <div class="card bg-light border-0">
                                    <div class="card-body">
                                        <h6 class="text-muted mb-3"><i class="fas fa-code-branch me-1"></i> Version Numbers</h6>
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">Minimum Version <small class="text-danger">(users below MUST update)</small></label>
                                            <input type="text" class="form-control" id="min-version" placeholder="e.g. 1.0.0">
                                        </div>
                                        <div class="mb-0">
                                            <label class="form-label fw-bold">Latest Version</label>
                                            <input type="text" class="form-control" id="latest-version" placeholder="e.g. 1.1.0">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card bg-light border-0">
                                    <div class="card-body">
                                        <h6 class="text-muted mb-3"><i class="fas fa-shield-alt me-1"></i> Force Update</h6>
                                        <div class="form-check form-switch mb-3">
                                            <input class="form-check-input" type="checkbox" id="force-update" style="width:3em;height:1.5em;">
                                            <label class="form-check-label ms-2 fw-bold" for="force-update">
                                                Force ALL users to update
                                            </label>
                                        </div>
                                        <p class="text-muted small mb-0">
                                            <i class="fas fa-exclamation-triangle me-1 text-warning"></i>
                                            When enabled, every user regardless of version will be forced to update. Use for critical/security updates only.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Message -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <div class="card bg-light border-0">
                                    <div class="card-body">
                                        <h6 class="text-muted mb-3"><i class="fas fa-comment-alt me-1"></i> Update Message</h6>
                                        <textarea class="form-control" id="message" rows="2" placeholder="Message shown to users when update is required"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Store URLs -->
                        <div class="row">
                            <div class="col-12">
                                <div class="card bg-light border-0">
                                    <div class="card-body">
                                        <h6 class="text-muted mb-3"><i class="fas fa-store me-1"></i> Store URLs</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label fw-bold"><i class="fab fa-google-play me-1 text-success"></i> Android</label>
                                                <input type="url" class="form-control" id="url-android" placeholder="https://play.google.com/store/...">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label fw-bold"><i class="fab fa-apple me-1"></i> iOS</label>
                                                <input type="url" class="form-control" id="url-ios" placeholder="https://apps.apple.com/app/...">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label fw-bold"><i class="fas fa-globe me-1 text-primary"></i> Web</label>
                                                <input type="url" class="form-control" id="url-web" placeholder="https://evcharge.eride.ng">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="alert" class="mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API = '/api';

    let authToken = sessionStorage.getItem('admin_token') || '';

    function showAlert(msg, type) {
        const el = document.getElementById('alert');
        el.className = 'mt-3 alert alert-' + type;
        el.textContent = msg;
        el.classList.remove('d-none');
        setTimeout(() => el.classList.add('d-none'), 5000);
    }

    // ─── Login ──────────────────────────────────────────
    document.getElementById('login-btn').addEventListener('click', async () => {
        const btn = document.getElementById('login-btn');
        const errEl = document.getElementById('login-error');
        errEl.classList.add('d-none');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Logging in...';

        try {
            const res = await fetch(API + '/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('login-username').value,
                    password: document.getElementById('login-password').value,
                }),
            });
            const data = await res.json();
            if (data.token) {
                authToken = data.token;
                sessionStorage.setItem('admin_token', authToken);
                document.getElementById('login-section').classList.add('d-none');
                document.getElementById('settings-section').classList.remove('d-none');
                loadSettings();
            } else {
                errEl.textContent = data.message || 'Login failed';
                errEl.classList.remove('d-none');
            }
        } catch (e) {
            errEl.textContent = 'Connection error: ' + e.message;
            errEl.classList.remove('d-none');
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt me-1"></i> Login';
    });

    // Auto-login if token exists
    if (authToken) {
        document.getElementById('login-section').classList.add('d-none');
        document.getElementById('settings-section').classList.remove('d-none');
        loadSettings();
    }

    // ─── Load Settings ──────────────────────────────────
    async function loadSettings() {
        document.getElementById('loading').classList.remove('d-none');
        document.getElementById('form').classList.add('d-none');
        try {
            const res = await fetch(API + '/mobile/app-version');
            const data = await res.json();
            if (data.success) {
                document.getElementById('min-version').value = data.minVersion || '';
                document.getElementById('latest-version').value = data.latestVersion || '';
                document.getElementById('force-update').checked = data.forceUpdate || false;
                document.getElementById('message').value = data.message || '';
                const urls = data.updateUrl || {};
                document.getElementById('url-android').value = urls.android || '';
                document.getElementById('url-ios').value = urls.ios || '';
                document.getElementById('url-web').value = urls.web || '';
            }
        } catch (e) {
            showAlert('Failed to load settings: ' + e.message, 'danger');
        }
        document.getElementById('loading').classList.add('d-none');
        document.getElementById('form').classList.remove('d-none');
    }

    // ─── Save Settings ──────────────────────────────────
    document.getElementById('save-btn').addEventListener('click', async () => {
        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Saving...';

        try {
            const body = {
                minVersion: document.getElementById('min-version').value,
                latestVersion: document.getElementById('latest-version').value,
                forceUpdate: document.getElementById('force-update').checked,
                message: document.getElementById('message').value,
                updateUrl: {
                    android: document.getElementById('url-android').value,
                    ios: document.getElementById('url-ios').value,
                    web: document.getElementById('url-web').value,
                },
            };

            const res = await fetch(API + '/mobile/app-version', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + authToken,
                },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (data.success) {
                showAlert('Settings saved successfully!', 'success');
            } else {
                if (res.status === 401 || res.status === 403) {
                    sessionStorage.removeItem('admin_token');
                    authToken = '';
                    document.getElementById('settings-section').classList.add('d-none');
                    document.getElementById('login-section').classList.remove('d-none');
                }
                showAlert(data.message || 'Failed to save', 'danger');
            }
        } catch (e) {
            showAlert('Error: ' + e.message, 'danger');
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save me-1"></i> Save Changes';
    });
    </script>
</body>
</html>
